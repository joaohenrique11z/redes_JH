<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/global.css">
  <link rel="stylesheet" href="./style/header.css">
  <link rel="stylesheet" href="./style/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Modelo OSI</title>
</head>

<body>
  <header class="head">
    <img class="osi-img" src="./assets/osi-icon.webp" alt="">
    <p class="title">Projeto Redes - Modelo OSI</p>
    <p class="user"></p>
  </header>
  <main class="main">
    <div class="request-wrapper">
      <select id="tipo-req" class="text-input" style="width: auto; margin-right: 1rem; cursor: pointer;">
        <option value="chat">1 - Chat</option>
        <option value="site">2 - Sites</option>
        <option value="email">3 - E-mail</option>
        <option value="arquivo">4 - Arquivos</option>
      </select>
      
      <input class="text-input" type="text" id="text-input" placeholder="Digite o texto, IP, etc..." style="margin-right: 1rem;">
      <input type="file" name="file" id="arquivo" style="margin-right: 1rem;">
      
      <button class="request-btn">Realizar Requisição</button>
    </div>
    <div class="protocol-name-wrapper">
      <h1 class="protocol-name"></h1>
    </div>
  </main>
  
  <script type="module" src="./scripts/application.js"></script>
  <script type="module" src="./scripts/OSI.js"></script>
</body>

</html>
