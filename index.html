<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/global.css">
  <link rel="stylesheet" href="./style/header.css">
  <link rel="stylesheet" href="./style/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Modelo OSI</title>
</head>

<body>
  <header class="head">
    <img class="osi-img" src="./assets/osi-icon.webp" alt="">
    <p class="title">Projeto Redes - Modelo OSI</p>
    <p class="user"></p>
  </header>
  <main class="main">
    <div class="request-wrapper">
      <input class="text-input" type="text" id="text-input" placeholder="Digite a mensagem, www.site.com ou email@..." style="margin-right: 1rem;">
      <input type="file" name="file" id="arquivo" style="margin-right: 1rem;">
      
      <button class="request-btn">Realizar Requisição</button>
    </div>

    <!-- Campos adicionais de E-mail (aparecem automaticamente quando "@" é detectado) -->
    <div id="email-form" style="display: none; padding: 1rem 2rem;">
      <div style="display: flex; gap: 1rem; margin-bottom: 0.75rem;">
        <input class="text-input" type="text" id="email-remetente" placeholder="Remetente" style="flex: 1;">
        <input class="text-input" type="text" id="email-destinatario" placeholder="Destinatário" style="flex: 1;">
        <input class="text-input" type="text" id="email-assunto" placeholder="Assunto" style="flex: 1;">
      </div>
      <div style="display: flex; gap: 1rem; margin-bottom: 0.75rem;">
        <textarea class="text-input" id="email-corpo" placeholder="Corpo da mensagem..." style="flex: 1; height: 6rem; resize: vertical; padding: 0.5rem;"></textarea>
      </div>
    </div>

    <div id="site-form" style="display: none; padding: 1rem 2rem;">
      <div style="display: flex; gap: 1rem; margin-bottom: 0.75rem;">
        <select id="site-metodo" class="text-input" style="flex: 1;">
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="DELETE">DELETE</option>
        </select>
      </div>
    </div>
  </main>
  
  <script type="module" src="./scripts/OSI.js"></script>
</body>

</html>
